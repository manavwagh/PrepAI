services:
  - type: web
    name: prepai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVEN_LABS_API_KEY
        sync: false
      - key: HUME_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AFFINDA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*" # Update this to your production frontend URL after deployment
